<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

<div class="container">

<div class="sidebar">
<h2>Info</h2>
<div class="extra-info">
    
    <div class="info-card">
        <p>💧 Humidity</p>
        <h3 id="humidity"></h3>
    </div>

    <div class="info-card">
        <p>🌬 Wind</p>
        <h3 id="wind-speed"></h3>
    </div>

    <div class="info-card">
        <p>🌡 Pressure</p>
        <h3 >1013 hPa</h3>
    </div>
</div>

<div class="extra-info">
    
    <div class="info-card">
        <p>Sunrise</p>
        <h3 id="sunrise"></h3>
    </div>

    <div class="info-card">
        <p>Sunset</p>
        <h3 id="sunset"></h3>
    </div>

</div>

</div>


<div class="main">

<div class="topbar">
<div class="city">Brooklyn, New York, USA</div>

<div class="search">
    <input type="text" placeholder="Search">
    <span class="icon"></span>
</div>
</div>

<div class="weather-main">
<div class="weather-widget">
    <div id="main-temp" class="temp"></div>

    <div class="details">
        <div class="row">
            <span class="label">H</span>
            <span class="value">29°</span>
        </div>
        <div class="row">
            <span class="label">L</span>
            <span class="value">12°</span>
        </div>
    </div>

    <!-- НОВИЙ БЛОК -->
</div>
<div class="recent">

    <div class="header">
        <span>Nearby cities</span>
    </div>

    <div class="cards">

        <div class="weather-card">
            <div class="top">
                <img src="" alt="">
                <h2 id="nearby-temp"></h2>
            </div>

            <h3 id="nearby-city">Liverpool, UK</h3>
            <p id="nearby-description">Partly Cloudy</p>
        </div>

        <div class="weather-card">
            <div class="top">
                <img src="" alt="">
                <h2>-2°</h2>
            </div>

            <h3>Palermo, Italy</h3>
            <p>RainThunder</p>
        </div>

    </div>

</div>
</div>

<div class="forecast">
<div class="day"><p>Sunday</p><span>28°</span></div>
<div class="day"><p>Monday</p><span>26°</span></div>
<div class="day"><p>Tuesday</p><span>27°</span></div>
<div class="day active"><p>Wednesday</p><span>23°</span></div>
<div class="day"><p>Thursday</p><span>30°</span></div>
<div class="day"><p>Friday</p><span>25°</span></div>
</div>

</div>

</div>

<script src="./main.js"></script>
</body>
</html>
