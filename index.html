<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherWise</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

<div class="container">

<div class="sidebar">
<h2>Info</h2>
<div class="extra-info">
    
    <div class="info-card">
        <p>💧 Humidity</p>
        <h3 id="humidity"></h3>
    </div>

    <div class="info-card">
        <p>🌬 Wind</p>
        <h3 id="wind-speed"></h3>
    </div>

    <div class="info-card">
        <p>🌡 Pressure</p>
        <h3 id="pressure"></h3>
    </div>
</div>

<div class="extra-info">
    
    <div class="info-card">
        <p>Sunrise</p>
        <h3 id="sunrise"></h3>
    </div>

    <div class="info-card">
        <p>Sunset</p>
        <h3 id="sunset"></h3>
    </div>

</div>

</div>


<div class="main">

<div class="topbar">
<div id="current-city" class="city"></div>

<div class="search">
    <input id="search-input" type="text" placeholder="Search">
    <span class="icon"></span>
    <button onclick="sendRequest()">Search</button>
</div>
</div>

<div class="weather-main">
<div class="weather-widget">
    <div>
        <div id="main-temp" class="temp"></div>
        <div id="main-feels-like"></div>
    </div>
    <!-- НОВИЙ БЛОК -->
</div>
<div class="recent">

    <div class="header">
        <span>Nearby cities</span>
    </div>

    <div class="cards">

        <div class="weather-card">
            <div class="top">
                <img src="" alt="">
                <h2 id="nearby-temp"></h2>
            </div>

            <h3 id="nearby-city"></h3>
            <p id="nearby-description"></p>
        </div>

        <div class="weather-card">
            <div class="top">
                <img src="" alt="">
                <h2 id="nearby-temp2"></h2>
            </div>

            <h3 id="nearby-city2"></h3>
            <p id="nearby-description2"></p>
        </div>

    </div>

</div>
</div>
<div id="forecast" class="forecast">
    
</div>

</div>

</div>

<script src="./main.js"></script>
</body>
</html>
